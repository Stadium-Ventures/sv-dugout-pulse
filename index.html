<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="color-scheme" content="dark">
<title>SV Dugout Pulse</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #22262f;
    --border: #2a2e3a;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent-blue: #3b82f6;
    --accent-orange: #f59e0b;
    --grade-milestone: #a855f7;
    --grade-standout: #ef4444;
    --grade-good: #22c55e;
    --grade-routine: #6b7280;
    --grade-flag: #eab308;
    --grade-nodata: #3f3f46;
    --live-green: #22c55e;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1rem;
  }

  /* ---- Header ---- */
  .header {
    text-align: center;
    padding: 1.5rem 0 1rem;
  }
  .header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header .subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-top: 0.25rem;
  }
  .next-update {
    color: var(--text-dim);
    font-size: 0.78rem;
    margin-top: 0.2rem;
  }

  /* ---- Filters ---- */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    padding: 1rem 0;
    max-width: 900px;
    margin: 0 auto;
  }
  .filter-group {
    display: flex;
    gap: 0.25rem;
    background: var(--surface);
    border-radius: 8px;
    padding: 3px;
  }
  .filter-btn {
    background: transparent;
    color: var(--text-dim);
    border: none;
    padding: 0.4rem 0.75rem;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { color: var(--text); background: var(--surface-hover); }
  .filter-btn.active { background: var(--border); color: var(--text); font-weight: 600; }
  .clear-filters-btn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 0.4rem 0.75rem;
    border-radius: 6px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .clear-filters-btn:hover { color: var(--text); border-color: var(--text-dim); }

  /* ---- Grid ---- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 0.75rem;
    max-width: 1200px;
    margin: 1rem auto;
  }

  /* ---- Card ---- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.1rem;
    transition: border-color 0.15s, opacity 0.25s ease, transform 0.25s ease;
    position: relative;
    contain: layout style paint;
    animation: cardFadeIn 0.25s ease;
  }
  @keyframes cardFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card:hover { border-color: #3a3e4a; }

  /* ---- Grade-tinted card backgrounds ---- */
  .card.grade-tint-milestone {
    background: linear-gradient(135deg, rgba(168,85,247,0.08) 0%, var(--surface) 60%);
    border-color: rgba(168,85,247,0.25);
  }
  .card.grade-tint-standout {
    background: linear-gradient(135deg, rgba(239,68,68,0.07) 0%, var(--surface) 60%);
    border-color: rgba(239,68,68,0.2);
  }
  .card.grade-tint-good {
    background: linear-gradient(135deg, rgba(34,197,94,0.06) 0%, var(--surface) 60%);
    border-color: rgba(34,197,94,0.18);
  }
  .card.grade-tint-flag {
    background: linear-gradient(135deg, rgba(234,179,8,0.06) 0%, var(--surface) 60%);
    border-color: rgba(234,179,8,0.18);
  }

  /* ---- Level accent (left border) ---- */
  .card.level-pro, .window-card.level-pro { border-left: 3px solid var(--accent-blue); }
  .card.level-ncaa, .window-card.level-ncaa { border-left: 3px solid var(--accent-orange); }

  /* ---- Live card glow (overrides level border) ---- */
  .card.live { border-left: 3px solid var(--live-green); animation: live-glow 2.5s ease-in-out infinite; }
  @keyframes live-glow {
    0%, 100% { box-shadow: 0 0 4px rgba(34,197,94,0.15); }
    50% { box-shadow: 0 0 12px rgba(34,197,94,0.3), 0 0 4px rgba(34,197,94,0.15); }
  }

  /* ---- Elevated stats for top performances ---- */
  .stats-elevated {
    font-size: 1.35rem !important;
    font-weight: 700 !important;
  }

  /* ---- De-emphasized tier badge ---- */
  .badge-tier-dim {
    font-size: 0.55rem;
    opacity: 0.5;
    background: rgba(107,114,128,0.12);
    color: #9ca3af;
  }

  /* ---- Larger grade bar ---- */
  .grade-bar {
    font-size: 0.9rem;
    font-weight: 700;
    padding: 0.35rem 0.7rem;
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
  }
  .player-name {
    font-size: 1.05rem;
    font-weight: 700;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  a.player-name {
    color: inherit;
    text-decoration: none;
  }
  a.player-name:hover {
    text-decoration: underline;
  }
  .live-dot {
    width: 8px; height: 8px;
    background: var(--live-green);
    border-radius: 50%;
    animation: pulse-dot 1.5s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
    50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(34,197,94,0); }
  }

  .badge {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.15rem 0.45rem;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .badge-pro { background: rgba(59,130,246,0.2); color: var(--accent-blue); }
  .badge-ncaa { background: rgba(245,158,11,0.2); color: var(--accent-orange); }
  .badge-t1 { background: rgba(168,85,247,0.15); color: #c084fc; }
  .badge-t2 { background: rgba(59,130,246,0.15); color: #93c5fd; }
  .badge-t3 { background: rgba(107,114,128,0.2); color: #9ca3af; }
  .badge-t4 { background: rgba(63,63,70,0.3); color: #71717a; }
  .badge-following { background: rgba(107,114,128,0.2); color: #9ca3af; }
  .badge-client { background: rgba(34,197,94,0.15); color: #86efac; }

  /* ---- Heartbeat status heart ---- */
  .heartbeat-link { text-decoration: none; flex-shrink: 0; }
  .heartbeat-icon {
    font-size: 0.85rem;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .heartbeat-icon:hover { transform: scale(1.2); }
  .heartbeat-red    { color: #ef4444; animation: heart-pulse 2s ease-in-out infinite; }
  .heartbeat-yellow { color: #eab308; }
  .heartbeat-green  { color: #22c55e; }
  .heartbeat-gray   { color: #6b7280; }
  @keyframes heart-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.25); }
  }

  .team-name {
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-bottom: 0.6rem;
  }

  .grade-bar {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    border-radius: 6px;
    margin-bottom: 0.6rem;
  }
  .grade-milestone { background: rgba(168,85,247,0.15); color: #c084fc; }
  .grade-standout { background: rgba(239,68,68,0.15); color: #fca5a5; }
  .grade-good { background: rgba(34,197,94,0.15); color: #86efac; }
  .grade-routine { background: rgba(107,114,128,0.15); color: #9ca3af; }
  .grade-flag { background: rgba(234,179,8,0.15); color: #fde047; }
  .grade-scheduled { background: rgba(59,130,246,0.15); color: #93c5fd; }
  .grade-nodata { background: rgba(63,63,70,0.2); color: #71717a; }

  .grade-reason {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
    font-style: italic;
  }

  .stats-line {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 0.3rem;
    font-variant-numeric: tabular-nums;
  }
  .game-context {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
  }
  a.game-context {
    text-decoration: none;
    display: block;
    transition: color 0.15s;
    cursor: pointer;
  }
  a.game-context:hover {
    color: var(--accent-blue);
    text-decoration: underline;
  }

  .game-date-label {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-bottom: 0.25rem;
  }

  .game-time {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
  }
  .game-time .time-value {
    color: var(--accent-blue);
    font-weight: 600;
  }

  .next-game {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 0.75rem;
    padding: 0.4rem 0.6rem;
    background: rgba(59,130,246,0.08);
    border-radius: 6px;
    border-left: 2px solid var(--accent-blue);
  }
  .next-game .next-label {
    color: var(--text-dim);
    font-weight: 500;
  }
  .next-game .next-value {
    color: var(--text);
  }

  .card-tags {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
    margin-bottom: 0.75rem;
  }
  .tag {
    font-size: 0.65rem;
    color: var(--text-dim);
    background: rgba(255,255,255,0.05);
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
  }

  .card-actions {
    display: flex;
    gap: 0.5rem;
  }
  .btn {
    flex: 1;
    padding: 0.5rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--text);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    text-decoration: none;
  }
  .btn:hover { background: var(--surface-hover); border-color: #4a4e5a; }


  /* (stale banner removed — pipeline runs on schedule) */

  /* ---- Auto-refresh indicator ---- */
  .auto-refresh-indicator {
    display: none;
    align-items: center;
    gap: 0.4rem;
    justify-content: center;
    font-size: 0.75rem;
    color: var(--live-green);
    margin-top: 0.25rem;
  }
  .auto-refresh-indicator.active { display: flex; }
  .auto-refresh-dot {
    width: 6px; height: 6px;
    background: var(--live-green);
    border-radius: 50%;
    animation: pulse-dot 1.5s infinite;
  }

  /* ---- Yesterday badge ---- */
  .badge-yesterday { background: rgba(245,158,11,0.2); color: var(--accent-orange); }

  /* ---- Doubleheader game number badge ---- */
  .badge-gm { background: var(--accent-blue); color: #fff; }

  /* ---- Stale data banner ---- */
  .stale-banner {
    display: none;
    max-width: 1200px;
    margin: 0.75rem auto 0;
    padding: 0.5rem 0.85rem;
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 8px;
    color: var(--accent-orange);
    font-size: 0.82rem;
    text-align: center;
  }

  /* ---- Collapsed no-game section ---- */
  .no-game-section {
    max-width: 1200px;
    margin: 1.5rem auto 0;
  }
  .no-game-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    padding: 0.6rem 0.8rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 0.85rem;
    font-weight: 600;
    user-select: none;
  }
  .no-game-header:hover { color: var(--text); border-color: #3a3e4a; }
  .no-game-chevron {
    transition: transform 0.2s;
    font-size: 0.7rem;
  }
  .no-game-header.open .no-game-chevron { transform: rotate(90deg); }
  .no-game-list {
    display: none;
    padding: 0.5rem 0;
  }
  .no-game-list.open { display: block; }
  .no-game-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.4rem 0.8rem;
    font-size: 0.8rem;
    color: var(--text-dim);
    border-bottom: 1px solid rgba(42,46,58,0.5);
  }
  .no-game-row:last-child { border-bottom: none; }
  .no-game-name {
    font-weight: 600;
    color: var(--text);
    min-width: 140px;
  }
  .no-game-team {
    min-width: 100px;
  }
  .no-game-next {
    flex: 1;
    text-align: right;
    font-size: 0.75rem;
  }

  /* ---- Skeleton loading cards ---- */
  .skeleton-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.1rem;
    overflow: hidden;
  }
  .skeleton-bar {
    background: var(--border);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .skeleton-bar::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .skeleton-name {
    height: 1rem;
    width: 60%;
    margin-bottom: 0.5rem;
  }
  .skeleton-team {
    height: 0.75rem;
    width: 35%;
    margin-bottom: 0.6rem;
  }
  .skeleton-stat {
    height: 0.8rem;
    width: 45%;
    margin-bottom: 0.4rem;
  }
  .skeleton-stat-short {
    height: 0.8rem;
    width: 30%;
    margin-bottom: 0.4rem;
  }
  .skeleton-stat-wide {
    height: 0.8rem;
    width: 70%;
  }

  /* ---- Empty state ---- */
  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 4rem 1rem;
    font-size: 0.95rem;
  }

  /* ---- Time Window Tabs (iOS segmented control) ---- */
  .time-tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    padding: 0.75rem 0;
    max-width: 440px;
    margin: 0 auto;
  }
  .time-tab {
    flex: 1;
    padding: 0.55rem 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .time-tab:first-child { border-radius: 8px 0 0 8px; }
  .time-tab:last-child { border-radius: 0 8px 8px 0; }
  .time-tab:not(:last-child) { border-right: none; }
  .time-tab.active {
    background: var(--accent-blue);
    color: white;
    border-color: var(--accent-blue);
  }
  .time-tab:hover:not(.active) {
    background: var(--surface-hover);
    color: var(--text);
  }

  /* ---- Window Stats Card ---- */
  .window-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.1rem;
    transition: border-color 0.15s;
    contain: layout style paint;
  }
  .window-card:hover { border-color: #3a3e4a; }

  .stat-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
    text-align: center;
    margin-top: 0.75rem;
  }
  .stat-row.pitcher-row { grid-template-columns: repeat(5, 1fr); }
  .stat-row.hitter-row  { grid-template-columns: repeat(5, 1fr); }

  .stat-cell {
    display: flex;
    flex-direction: column;
  }
  .stat-label {
    font-size: 0.6rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.15rem;
  }
  .stat-value {
    font-size: 1rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .stat-value.sparse { color: var(--text-dim); }
  .stat-value.rate-hot { color: #4ade80; }
  .stat-value.rate-warm { color: #86efac; }
  .stat-value.rate-cold { color: #fca5a5; }
  .stat-value.rate-ice { color: #f87171; }

  /* Window grades */
  .window-grade {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.3rem 0.6rem;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  .grade-hot { background: rgba(239,68,68,0.15); color: #fca5a5; }
  .grade-solid { background: rgba(34,197,94,0.15); color: #86efac; }
  .grade-quiet { background: rgba(107,114,128,0.15); color: #9ca3af; }
  .grade-cold { background: rgba(59,130,246,0.15); color: #93c5fd; }
  .grade-insufficient { background: rgba(63,63,70,0.2); color: #71717a; }

  .games-played {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 0.5rem;
  }

  /* ---- Game Log Drill-Down ---- */
  .game-log-toggle {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    cursor: pointer;
    padding: 0.5rem 0 0.3rem;
    margin-top: 0.5rem;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.78rem;
    font-weight: 600;
    user-select: none;
  }
  .game-log-toggle:hover { color: var(--text); }
  .game-log-chevron {
    transition: transform 0.2s;
    font-size: 0.65rem;
  }
  .game-log-toggle.open .game-log-chevron { transform: rotate(90deg); }
  .game-log-entries {
    display: none;
    padding: 0.25rem 0 0;
  }
  .game-log-entries.open { display: block; }
  .game-log-row {
    display: grid;
    grid-template-columns: 3.2rem 1fr;
    gap: 0.4rem;
    padding: 0.25rem 0;
    font-size: 0.75rem;
    border-bottom: 1px solid rgba(42,46,58,0.4);
  }
  .game-log-row:last-child { border-bottom: none; }
  .game-log-date {
    color: var(--text-dim);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .game-log-opp {
    color: var(--text-dim);
    font-size: 0.7rem;
  }
  .game-log-stats {
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  /* ---- Search bar ---- */
  .search-wrap {
    max-width: 400px;
    margin: 0 auto;
    padding: 0 0 0.5rem;
  }
  .search-input {
    width: 100%;
    padding: 0.5rem 0.75rem 0.5rem 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--accent-blue); }
  .search-wrap { position: relative; }
  .search-icon {
    position: absolute;
    left: 0.6rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 0.85rem;
    pointer-events: none;
  }

  /* ---- Data source label ---- */
  .data-source {
    font-size: 0.7rem;
    color: var(--text-dim);
    opacity: 0.6;
    margin-top: 0.15rem;
  }

  /* ---- XBH highlights in stats line ---- */
  .stat-highlight-hr {
    color: #fbbf24;
    font-weight: 700;
  }
  .stat-highlight-xbh {
    color: #a78bfa;
    font-weight: 700;
  }
  .stat-highlight-rbi {
    color: #f97316;
    font-weight: 700;
  }
  .stat-highlight-sb {
    color: #06b6d4;
    font-weight: 700;
  }
  .stat-highlight-bb {
    color: #34d399;
    font-weight: 600;
  }
  .stat-highlight-k {
    color: #ef4444;
    font-weight: 600;
  }

  /* ---- Pull-to-refresh ---- */
  .pull-refresh {
    text-align: center;
    font-size: 0.8rem;
    color: var(--accent-blue);
    height: 0;
    overflow: hidden;
    transition: height 0.3s ease, opacity 0.3s ease;
    opacity: 0;
    line-height: 2.5rem;
  }
  .pull-refresh.active {
    height: 2.5rem;
    opacity: 1;
  }

  /* ---- Status section headers ---- */
  .status-section-header {
    grid-column: 1 / -1;
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #9ca3af;
    padding: 0.75rem 0 0.25rem;
    border-bottom: 1px solid rgba(156,163,175,0.2);
    margin-bottom: 0.25rem;
  }

  /* ---- Responsive ---- */
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .filters { overflow-x: auto; flex-wrap: nowrap; justify-content: flex-start; padding: 0.75rem 0; position: relative; }
    .filters::after {
      content: '';
      position: sticky;
      right: 0;
      top: 0;
      flex-shrink: 0;
      width: 2rem;
      height: 100%;
      background: linear-gradient(to right, transparent, var(--bg));
      pointer-events: none;
    }
    .filter-group { flex-shrink: 0; }
    body { padding: 0.5rem; }
    .header h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="pull-refresh" id="pullRefresh">Refreshing...</div>

<div class="header">
  <h1>SV Dugout Pulse</h1>
  <div class="subtitle" id="updated"></div>
  <div class="next-update" id="nextUpdate"></div>
  <div class="auto-refresh-indicator" id="autoRefreshIndicator">
    <div class="auto-refresh-dot"></div>
    <span>Auto-refreshing</span>
  </div>
</div>
<div class="stale-banner" id="staleBanner"></div>
<div class="time-tabs" role="tablist" aria-label="Time window">
  <button class="time-tab active" data-window="today" role="tab" aria-selected="true">Today</button>
  <button class="time-tab" data-window="yesterday" role="tab" aria-selected="false">Yesterday</button>
  <button class="time-tab" data-window="7d" role="tab" aria-selected="false">7 Days</button>
  <button class="time-tab" data-window="season" role="tab" aria-selected="false">Season</button>
</div>

<div class="search-wrap" role="search">
  <span class="search-icon" aria-hidden="true">&#x1F50D;</span>
  <input type="text" class="search-input" id="searchInput" placeholder="Search players..." autocomplete="off" aria-label="Search players">
</div>

<div class="filters">
  <div class="filter-group" data-filter="roster">
    <button class="filter-btn active" data-value="all">All</button>
    <button class="filter-btn" data-value="client">Clients</button>
    <button class="filter-btn" data-value="following">Following</button>
  </div>
  <div class="filter-group" data-filter="level">
    <button class="filter-btn active" data-value="all">All</button>
    <button class="filter-btn" data-value="Pro">Pro</button>
    <button class="filter-btn" data-value="NCAA">NCAA</button>
  </div>
  <div class="filter-group" data-filter="position">
    <button class="filter-btn active" data-value="all">All</button>
    <button class="filter-btn" data-value="Hitter">Hitters</button>
    <button class="filter-btn" data-value="Pitcher">Pitchers</button>
  </div>
  <div class="filter-group" data-filter="status">
    <button class="filter-btn active" data-value="all">All</button>
    <button class="filter-btn" data-value="Live">Live</button>
    <button class="filter-btn" data-value="Final">Final</button>
    <button class="filter-btn" data-value="Cancelled">Postponed</button>
  </div>
  <div class="filter-group" data-filter="heartbeat">
    <button class="filter-btn active" data-value="all">&#x2665; All</button>
    <button class="filter-btn" data-value="red" style="color:#ef4444">&#x2665;</button>
    <button class="filter-btn" data-value="yellow" style="color:#eab308">&#x2665;</button>
    <button class="filter-btn" data-value="green" style="color:#22c55e">&#x2665;</button>
  </div>
  <div class="filter-group" data-filter="grade">
    <button class="filter-btn active" data-value="all">All</button>
    <button class="filter-btn" data-value="Milestone" title="Milestone: Debut or historic achievement">&#x1f48e;</button>
    <button class="filter-btn" data-value="Standout" title="Standout: HR, 3+ hits, 3+ RBI, or dominant pitching">&#x1f525;</button>
    <button class="filter-btn" data-value="Good" title="Good: 2+ hits, XBH, steal, or clean pitching outing">&#x2705;</button>
    <button class="filter-btn" data-value="Routine" title="Routine: Normal game — nothing stood out">&#x1f610;</button>
    <button class="filter-btn" data-value="Off Day" title="Off Day: Hitless in 4+ AB, 3+ Ks, or rough pitching">&#x1f6a9;</button>
    <button class="filter-btn" data-value="Scheduled" title="Scheduled: Game hasn't started yet">&#x1f552;</button>
  </div>
  <button class="clear-filters-btn" id="clearFiltersBtn" title="Reset all filters" style="display:none;">Clear filters</button>
</div>

<div class="grid" id="grid"></div>
<div class="no-game-section" id="noGameSection" style="display:none;">
  <div class="no-game-header" id="noGameHeader" onclick="toggleNoGame()" role="button" aria-expanded="false">
    <span class="no-game-chevron" aria-hidden="true">&#x25B6;</span>
    <span id="noGameLabel">No game today</span>
  </div>
  <div class="no-game-list" id="noGameList"></div>
</div>
<div class="empty" id="empty" style="display:none;">No players match the current filters.</div>

<script>
const GRADE_ORDER = ['Milestone','Standout','Good','Routine','Off Day','Scheduled','No Data'];
const GRADE_CLASS = {
  'Milestone':'grade-milestone','Standout':'grade-standout','Good':'grade-good',
  'Routine':'grade-routine','Off Day':'grade-flag','Scheduled':'grade-scheduled','No Data':'grade-nodata'
};

// Window grade classes
const WINDOW_GRADE_CLASS = {
  'Hot':'grade-hot','Solid':'grade-solid','Steady':'grade-quiet',
  'Cold':'grade-cold','Insufficient':'grade-insufficient'
};

let allPlayers = [];
let dataGeneratedAt = null;
let yesterdaySourceDate = null;
let autoRefreshTimer = null;
let filters = { roster:'all', level:'all', position:'all', status:'all', grade:'all', heartbeat:'all' };
let searchQuery = '';
let heartbeatData = new Map();

// Time window state
let currentWindow = 'today';
const windowData = { today: null, yesterday: null, '7d': null, season: null };
const _windowFetchFailed = { today: false, yesterday: false, '7d': false, season: false };
const _scrollPositions = { today: 0, yesterday: 0, '7d': 0, season: 0 };
const WINDOW_PATHS = {
  today: 'data/current_pulse.json',
  yesterday: 'data/yesterday_pulse.json',
  '7d': 'data/window_7d.json',
  season: 'data/window_season.json'
};

function gradeKey(g) {
  for (const k of GRADE_ORDER) { if (g.includes(k)) return k; }
  return 'No Data';
}

const STATUS_PRIORITY = { 'Live': 0, 'Final': 1, 'Scheduled': 2, 'Cancelled': 3, 'N/A': 4 };
function statusTier(s) { return STATUS_PRIORITY[s] ?? 4; }

// Sub-sort within Live: 0=has stats, 1=in game no stats yet, 2=not confirmed in game
function liveSubTier(p) {
  const s = p.stats_summary || '';
  if (s === 'Game in progress — not in lineup' || s === 'Game in progress') return 2;
  if (s === 'In lineup' || s === 'In starting lineup' || s === 'Game in progress — not yet pitching') return 1;
  return 0;
}

function hasRealStats(p) {
  const s = p.stats_summary || '';
  return p.game_status === 'Final' && !s.startsWith('Did Not Play') && s !== 'No game scheduled' && s !== '';
}

function sortPlayers(players) {
  return players.slice().sort((a, b) => {
    // Status tier: Live > Final > Scheduled > Cancelled > N/A
    const aSt = statusTier(a.game_status);
    const bSt = statusTier(b.game_status);
    if (aSt !== bSt) return aSt - bSt;
    // Within Live: stats > in lineup/not yet pitching > not in game, then tier
    if (a.game_status === 'Live') {
      const aLive = liveSubTier(a);
      const bLive = liveSubTier(b);
      if (aLive !== bLive) return aLive - bLive;
    }
    // Within Final: players with real stats before DNP
    const aHas = hasRealStats(a) ? 0 : 1;
    const bHas = hasRealStats(b) ? 0 : 1;
    if (aHas !== bHas) return aHas - bHas;
    // Grade order (performance first)
    const aG = GRADE_ORDER.indexOf(gradeKey(a.performance_grade));
    const bG = GRADE_ORDER.indexOf(gradeKey(b.performance_grade));
    if (aG !== bG) return aG - bG;
    // Roster priority (tier)
    return (a.tags.roster_priority || 99) - (b.tags.roster_priority || 99);
  });
}

function matchesFilters(p) {
  if (searchQuery && !p.player_name.toLowerCase().includes(searchQuery)) return false;
  if (filters.roster === 'client' && p.is_client === false) return false;
  if (filters.roster === 'following' && p.is_client !== false) return false;
  if (filters.level !== 'all' && p.level !== filters.level) return false;
  if (filters.position !== 'all' && p.tags.position !== filters.position) return false;
  if (filters.status !== 'all' && p.game_status !== filters.status) return false;
  if (filters.grade !== 'all' && !p.performance_grade.includes(filters.grade)) return false;
  if (filters.heartbeat !== 'all') {
    if (p.is_client === false) return false;
    const hb = heartbeatData.get(p.player_name.toLowerCase());
    if ((hb ? hb.status : 'gray') !== filters.heartbeat) return false;
  }
  return true;
}

function heartbeatHtml(playerName, isClient) {
  if (!isClient) return '';
  const key = playerName.toLowerCase();
  const hb = heartbeatData.get(key);
  const status = hb ? hb.status : 'gray';
  const colorClass = 'heartbeat-' + status;
  let title;
  if (hb) {
    title = 'Love Score: ' + hb.loveScore;
    if (hb.daysSinceContact != null) title += ' \u2014 Last contact: ' + hb.daysSinceContact + ' day' + (hb.daysSinceContact !== 1 ? 's' : '') + ' ago';
  } else {
    title = 'No Heartbeat data';
  }
  return `<a class="heartbeat-link" href="https://sv-heartbeat.vercel.app/" target="_blank" rel="noopener" title="${esc(title, true)}"><span class="heartbeat-icon ${colorClass}">\u2665</span></a>`;
}

function renderCard(p) {
  const gk = gradeKey(p.performance_grade);
  const gc = GRADE_CLASS[gk] || 'grade-nodata';
  const isLive = p.game_status === 'Live';
  const isScheduled = p.game_status === 'Scheduled';
  const isClient = p.is_client !== false;
  const pri = p.tags.roster_priority || 4;
  const isYesterday = p.is_yesterday === true;

  // Grade-tinted background class
  const TINT_MAP = { 'Milestone':'grade-tint-milestone', 'Standout':'grade-tint-standout', 'Good':'grade-tint-good', 'Off Day':'grade-tint-flag' };
  const tintClass = TINT_MAP[gk] || '';

  // Elevated stats for top performances
  const isElevated = gk === 'Milestone' || gk === 'Standout';

  // Game date display for yesterday entries
  let gameDateHtml = '';
  if (isYesterday && p.game_date) {
    const d = new Date(p.game_date + 'T12:00:00');
    const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    gameDateHtml = `<div class="game-date-label">${label}</div>`;
  }

  // Game time display — omitted for scheduled games since stats_summary
  // and game_context already show the time.
  const gameTimeHtml = '';

  // Next game display when no game today
  const nextGameHtml = p.next_game && !isLive && !isScheduled && p.game_status !== 'Final'
    ? `<div class="next-game"><span class="next-label">Next:</span> <span class="next-value">${esc(p.next_game.display)}</span></div>`
    : '';

  return `
    <div class="card${isLive ? ' live' : ''} level-${p.level === 'Pro' ? 'pro' : 'ncaa'}${tintClass ? ' ' + tintClass : ''}">
      <div class="card-top">
        ${isLive ? '<div class="live-dot"></div>' : ''}
        ${p.player_profile_url
          ? `<a class="player-name" href="${esc(p.player_profile_url, true)}" target="_blank" rel="noopener">${esc(p.player_name)}</a>`
          : `<span class="player-name">${esc(p.player_name)}</span>`}
        ${heartbeatHtml(p.player_name, isClient)}
        ${isYesterday ? '<span class="badge badge-yesterday">Yesterday</span>' : ''}
        ${p.split_squad ? '<span class="badge badge-gm">SS</span>' : p.game_number ? `<span class="badge badge-gm">Gm ${p.game_number}</span>` : ''}
        <span class="badge ${isClient ? 'badge-client' : 'badge-following'}">${isClient ? 'Client' : 'Following'}</span>
        <span class="badge ${p.level === 'Pro' ? 'badge-pro' : 'badge-ncaa'}">${esc(p.level)}</span>
        <span class="badge badge-tier-dim">T${pri}</span>
      </div>
      <div class="team-name">${esc(p.team)}</div>
      <div class="grade-bar ${gc}">${esc(p.performance_grade)}</div>
      ${p.grade_reason ? `<div class="grade-reason">${esc(p.grade_reason)}</div>` : ''}
      <div class="stats-line${isElevated ? ' stats-elevated' : ''}">${highlightStats(p.stats_summary)}</div>
      ${p.game_context ? (p.box_score_url
        ? `<a class="game-context" href="${esc(p.box_score_url, true)}" target="_blank" rel="noopener">${esc(p.game_context)}</a>`
        : `<div class="game-context">${esc(p.game_context)}</div>`) : ''}
      ${p.data_source ? `<div class="data-source">via ${esc(p.data_source)}</div>` : ''}
      ${gameDateHtml}
      ${gameTimeHtml}
      ${nextGameHtml}
      <div class="card-tags">
        <span class="tag">${esc(p.tags.position)}</span>
        ${p.tags.draft_class && p.tags.draft_class !== 'N/A' ? `<span class="tag">${esc(p.tags.draft_class)}</span>` : ''}
      </div>
      <div class="card-actions">
        <a class="btn" href="${esc(p.social_search_url)}" target="_blank" rel="noopener">X Search</a>
        ${p.box_score_url ? `<a class="btn" href="${esc(p.box_score_url, true)}" target="_blank" rel="noopener">${p.game_status === 'Scheduled' ? 'Preview' : 'Box Score'}</a>` : ''}
      </div>
    </div>`;
}

function esc(s, forAttr) {
  if (!s) return '';
  s = s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  if (forAttr) s = s.replace(/'/g,"\\'").replace(/"/g,'&quot;');
  return s;
}

function highlightStats(summary) {
  if (!summary) return '';
  let s = esc(summary);
  s = s.replace(/\b(\d+\s)?(HR)\b/g, '<span class="stat-highlight-hr">$&</span>');
  s = s.replace(/\b(\d+\s)?(3B)\b/g, '<span class="stat-highlight-xbh">$&</span>');
  s = s.replace(/\b(\d+\s)?(2B)\b/g, '<span class="stat-highlight-xbh">$&</span>');
  s = s.replace(/\b(\d+\s)?(RBI)\b/g, '<span class="stat-highlight-rbi">$&</span>');
  s = s.replace(/\b(\d+\s)?(SB)\b/g, '<span class="stat-highlight-sb">$&</span>');
  s = s.replace(/\b(\d+\s)?(BB)\b/g, '<span class="stat-highlight-bb">$&</span>');
  s = s.replace(/\b(\d+\s)?(K)\b/g, '<span class="stat-highlight-k">$&</span>');
  return s;
}

function windowGradeKey(g) {
  if (!g) return 'Insufficient';
  for (const k of ['Hot','Solid','Steady','Cold','Insufficient']) {
    if (g.includes(k)) return k;
  }
  return 'Insufficient';
}

function rateColor(val, thresholds) {
  // thresholds = [hot, warm, cold] e.g. [.900, .750, .550] for OPS
  if (val === '--' || val == null) return '';
  const n = parseFloat(val);
  if (isNaN(n)) return '';
  if (n >= thresholds[0]) return 'rate-hot';
  if (n >= thresholds[1]) return 'rate-warm';
  if (n < thresholds[2]) return 'rate-ice';
  return '';
}

function eraColor(val) {
  if (val === '--' || val == null) return '';
  const n = parseFloat(val);
  if (isNaN(n)) return '';
  if (n <= 2.00) return 'rate-hot';
  if (n <= 3.50) return 'rate-warm';
  if (n >= 5.00) return 'rate-ice';
  return '';
}

function renderWindowCard(p) {
  const position = p.tags?.position || 'Hitter';
  const isPitcher = position === 'Pitcher';
  const gk = windowGradeKey(p.window_grade);
  const gc = WINDOW_GRADE_CLASS[gk] || 'grade-insufficient';
  const isClient = p.is_client !== false;
  const stats = p.stats || {};
  const gp = p.games_played ?? 0;
  const gpLabel = gp === 1 ? '1 G' : `${gp} G`;

  let statsHtml;
  if (isPitcher) {
    const isSparse = stats.ip === '--';
    const sp = isSparse ? 'sparse' : '';
    statsHtml = `
      <div class="stat-row pitcher-row">
        <div class="stat-cell">
          <span class="stat-label">IP</span>
          <span class="stat-value ${sp}">${stats.ip ?? '--'}</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">K</span>
          <span class="stat-value ${sp}">${stats.k ?? '--'}</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">BB</span>
          <span class="stat-value ${sp}">${stats.bb ?? '--'}</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">ERA</span>
          <span class="stat-value ${sp} ${isSparse ? '' : eraColor(stats.era)}">${stats.era ?? '--'}</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">WHIP</span>
          <span class="stat-value ${sp}">${stats.whip ?? '--'}</span>
        </div>
      </div>
      <div class="stat-row" style="grid-template-columns: repeat(2, 1fr); max-width: 40%;">
        <div class="stat-cell">
          <span class="stat-label">K%</span>
          <span class="stat-value ${sp}">${stats.k_pct ?? '--'}</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">BB%</span>
          <span class="stat-value ${sp}">${stats.bb_pct ?? '--'}</span>
        </div>
      </div>`;
  } else {
    const isSparse = stats.pa === '--';
    const sp = isSparse ? 'sparse' : '';
    statsHtml = `
      <div class="stat-row hitter-row">
        <div class="stat-cell">
          <span class="stat-label">PA</span>
          <span class="stat-value ${sp}">${stats.pa ?? '--'}</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">H</span>
          <span class="stat-value ${sp}">${stats.h ?? '--'}</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">HR</span>
          <span class="stat-value ${sp}">${stats.hr ?? '--'}</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">RBI</span>
          <span class="stat-value ${sp}">${stats.rbi ?? '--'}</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">SB</span>
          <span class="stat-value ${sp}">${stats.sb ?? '--'}</span>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-cell">
          <span class="stat-label">AVG</span>
          <span class="stat-value ${sp} ${isSparse ? '' : rateColor(stats.avg, [.350, .275, .200])}">${stats.avg ?? '--'}</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">OBP</span>
          <span class="stat-value ${sp} ${isSparse ? '' : rateColor(stats.obp, [.400, .330, .280])}">${stats.obp ?? '--'}</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">SLG</span>
          <span class="stat-value ${sp} ${isSparse ? '' : rateColor(stats.slg, [.550, .420, .320])}">${stats.slg ?? '--'}</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">OPS</span>
          <span class="stat-value ${sp} ${isSparse ? '' : rateColor(stats.ops, [.900, .750, .550])}">${stats.ops ?? '--'}</span>
        </div>
      </div>
      <div class="stat-row" style="grid-template-columns: repeat(2, 1fr); max-width: 40%;">
        <div class="stat-cell">
          <span class="stat-label">K%</span>
          <span class="stat-value ${sp}">${stats.k_pct ?? '--'}</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">BB%</span>
          <span class="stat-value ${sp}">${stats.bb_pct ?? '--'}</span>
        </div>
      </div>`;
  }

  // Game log drill-down (7D only)
  let gameLogHtml = '';
  if (p.game_log && p.game_log.length > 0) {
    const logId = 'gl-' + p.player_name.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '') + (p.game_number ? `-gm${p.game_number}` : '');
    const rows = p.game_log.map(g => {
      const d = new Date(g.date + 'T12:00:00');
      const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
      const s = g.stats || {};
      let statLine;
      if ('ip' in s && !('ab' in s)) {
        // Pitcher line (handle '--' sentinel for sparse/missing data)
        const gIp = (s.ip == null || s.ip === '--') ? '0' : s.ip;
        const gEr = (s.er == null || s.er === '--') ? 0 : s.er;
        const gK  = (s.k  == null || s.k  === '--') ? 0 : s.k;
        const gBb = (s.bb == null || s.bb === '--') ? 0 : s.bb;
        statLine = `${gIp} IP, ${gEr} ER, ${gK} K, ${gBb} BB`;
      } else {
        // Hitter line
        const parts = [`${s.h ?? 0}-${s.ab ?? 0}`];
        if ((s.hr ?? 0) > 0) parts.push(`${s.hr} HR`);
        if ((s.rbi ?? 0) > 0) parts.push(`${s.rbi} RBI`);
        if ((s.r ?? 0) > 0) parts.push(`${s.r} R`);
        if ((s.sb ?? 0) > 0) parts.push(`${s.sb} SB`);
        statLine = parts.join(', ');
      }
      const oppStr = g.opponent ? `<span class="game-log-opp">${esc(g.opponent)}</span> ` : '';
      return `<div class="game-log-row"><span class="game-log-date">${dateStr}</span><span class="game-log-stats">${oppStr}${esc(statLine)}</span></div>`;
    }).join('');
    gameLogHtml = `
      <div class="game-log-toggle" id="glt-${logId}" onclick="toggleGameLog('${logId}')" role="button" aria-expanded="false">
        <span class="game-log-chevron" aria-hidden="true">&#x25B6;</span>
        Game log (${p.game_log.length})
      </div>
      <div class="game-log-entries" id="gle-${logId}">
        ${rows}
      </div>`;
  }

  // Build profile URL for window cards
  let profileUrl = null;
  if (p.level === 'NCAA' && p.player_name) {
    profileUrl = 'https://www.google.com/search?q=' + encodeURIComponent('site:thebaseballcube.com "' + p.player_name + '"') + '&btnI=';
  }

  return `
    <div class="window-card level-${p.level === 'Pro' ? 'pro' : 'ncaa'}">
      <div class="card-top">
        ${profileUrl
          ? `<a class="player-name" href="${esc(profileUrl, true)}" target="_blank" rel="noopener">${esc(p.player_name)}</a>`
          : `<span class="player-name">${esc(p.player_name)}</span>`}
        ${heartbeatHtml(p.player_name, isClient)}
        <span class="badge ${isClient ? 'badge-client' : 'badge-following'}">${isClient ? 'Client' : 'Following'}</span>
        <span class="badge ${p.level === 'Pro' ? 'badge-pro' : 'badge-ncaa'}">${esc(p.level)}</span>
        <span class="badge" style="background:rgba(107,114,128,0.15);color:#9ca3af">${gpLabel}</span>
      </div>
      <div class="team-name">${esc(p.team)}</div>
      <div class="window-grade ${gc}">${esc(p.window_grade || '— No Data')}</div>
      ${statsHtml}
      ${gameLogHtml}
    </div>`;
}

function matchesWindowFilters(p) {
  if (searchQuery && !p.player_name.toLowerCase().includes(searchQuery)) return false;
  if (filters.roster === 'client' && p.is_client === false) return false;
  if (filters.roster === 'following' && p.is_client !== false) return false;
  if (filters.level !== 'all' && p.level !== filters.level) return false;
  if (filters.position !== 'all' && p.tags?.position !== filters.position) return false;
  if (filters.heartbeat !== 'all') {
    if (p.is_client === false) return false;
    const hb = heartbeatData.get(p.player_name.toLowerCase());
    if ((hb ? hb.status : 'gray') !== filters.heartbeat) return false;
  }
  return true;
}

function sortWindowPlayers(players) {
  return players.slice().sort((a, b) => {
    // Clients before following
    const aClient = a.is_client !== false ? 0 : 1;
    const bClient = b.is_client !== false ? 0 : 1;
    if (aClient !== bClient) return aClient - bClient;
    // Grade order (Hot > Solid > Quiet > Cold > Insufficient)
    const gradeOrder = ['Hot','Solid','Steady','Cold','Insufficient'];
    const aG = gradeOrder.indexOf(windowGradeKey(a.window_grade));
    const bG = gradeOrder.indexOf(windowGradeKey(b.window_grade));
    if (aG !== bG) return aG - bG;
    // Within same grade: sort by OPS (hitters) or ERA (pitchers) desc/asc
    const aOps = parseFloat(a.stats?.ops) || 0;
    const bOps = parseFloat(b.stats?.ops) || 0;
    const aEra = parseFloat(a.stats?.era);
    const bEra = parseFloat(b.stats?.era);
    // If both have ERA (pitchers), lower ERA first
    if (!isNaN(aEra) && !isNaN(bEra) && aEra !== bEra) return aEra - bEra;
    // Otherwise sort by OPS descending
    if (aOps !== bOps) return bOps - aOps;
    // Roster priority
    return (a.tags?.roster_priority || 99) - (b.tags?.roster_priority || 99);
  });
}

function render() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const noGameSection = document.getElementById('noGameSection');

  if (currentWindow === 'today') {
    const allFiltered = allPlayers.filter(matchesFilters);

    // Split into active (have a game) and no-game players
    const hasStatusFilter = filters.status !== 'all';
    const activePlayers = allFiltered.filter(p => p.game_status !== 'N/A');
    const noGamePlayers = hasStatusFilter ? [] : allFiltered.filter(p => p.game_status === 'N/A');

    const sorted = sortPlayers(activePlayers);

    if (sorted.length === 0 && noGamePlayers.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      empty.textContent = 'No players match the current filters.';
      noGameSection.style.display = 'none';
    } else {
      empty.style.display = 'none';
      const groups = [
        { key: 'Live', label: 'In Progress' },
        { key: 'Final', label: 'Final' },
        { key: 'Scheduled', label: 'Scheduled' },
        { key: 'Cancelled', label: 'Postponed' },
      ];
      let html = '';
      for (const g of groups) {
        const section = sorted.filter(p => p.game_status === g.key);
        if (section.length === 0) continue;
        html += `<div class="status-section-header">${g.label}</div>`;
        html += section.map(renderCard).join('');
      }
      grid.innerHTML = html;
    }

    // Render collapsed no-game section
    if (noGamePlayers.length > 0) {
      noGameSection.style.display = 'block';
      document.getElementById('noGameLabel').textContent = `No game today (${noGamePlayers.length})`;
      const sortedNoGame = noGamePlayers.slice().sort((a, b) => {
        const ac = a.is_client !== false ? 0 : 1;
        const bc = b.is_client !== false ? 0 : 1;
        if (ac !== bc) return ac - bc;
        return (a.tags.roster_priority || 99) - (b.tags.roster_priority || 99);
      });
      document.getElementById('noGameList').innerHTML = sortedNoGame.map(p => {
        const nextText = p.next_game ? p.next_game.display : 'No game scheduled';
        const isClient = p.is_client !== false;
        return `<div class="no-game-row">
          <span class="no-game-name">${esc(p.player_name)}</span>
          ${heartbeatHtml(p.player_name, isClient)}
          <span class="no-game-team">${esc(p.team)}</span>
          <span class="no-game-next">${esc(nextText)}</span>
        </div>`;
      }).join('');
    } else {
      noGameSection.style.display = 'none';
    }

    manageAutoRefresh();
  } else if (currentWindow === 'yesterday') {
    noGameSection.style.display = 'none';
    const data = windowData.yesterday || [];
    // Only show players whose team actually played — exclude any stale or wrong-date entries
    const filtered = sortPlayers(data.filter(p => p.game_status === 'Final' && matchesFilters(p)));

    if (windowData.yesterday === null) {
      empty.style.display = 'none';
      grid.innerHTML = Array(6).fill(
        `<div class="skeleton-card">
          <div class="skeleton-bar skeleton-name"></div>
          <div class="skeleton-bar skeleton-team"></div>
          <div class="skeleton-bar skeleton-stat"></div>
          <div class="skeleton-bar skeleton-stat-short"></div>
          <div class="skeleton-bar skeleton-stat-wide"></div>
        </div>`
      ).join('');
    } else if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      if (_windowFetchFailed.yesterday) {
        empty.textContent = 'Couldn\u2019t load yesterday data \u2014 check your connection and pull to refresh.';
      } else if (data.length > 0) {
        empty.textContent = 'No matches \u2014 try clearing your filters.';
      } else {
        empty.textContent = 'No games yesterday.';
      }
    } else {
      empty.style.display = 'none';
      grid.innerHTML = filtered.map(renderCard).join('');
    }
  } else {
    noGameSection.style.display = 'none';
    // Window view - use window card renderer
    if (windowData[currentWindow] === null) {
      // Show skeleton loading cards
      empty.style.display = 'none';
      grid.innerHTML = Array(6).fill(
        `<div class="skeleton-card">
          <div class="skeleton-bar skeleton-name"></div>
          <div class="skeleton-bar skeleton-team"></div>
          <div class="skeleton-bar skeleton-stat"></div>
          <div class="skeleton-bar skeleton-stat-short"></div>
          <div class="skeleton-bar skeleton-stat-wide"></div>
        </div>`
      ).join('');
    } else {
      const data = windowData[currentWindow] || [];
      const filtered = sortWindowPlayers(data.filter(matchesWindowFilters));
      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        if (_windowFetchFailed[currentWindow]) {
          empty.textContent = 'Couldn\u2019t load data \u2014 check your connection and pull to refresh.';
        } else if (data.length > 0) {
          empty.textContent = 'No matches \u2014 try clearing your filters.';
        } else {
          empty.textContent = 'No data available for this window.';
        }
      } else {
        empty.style.display = 'none';
        grid.innerHTML = filtered.map(renderWindowCard).join('');
      }
    }
  }
  updateGradeFilterCounts();
}

function updateGradeFilterCounts() {
  // Only show counts for today/yesterday views
  if (currentWindow !== 'today' && currentWindow !== 'yesterday') return;
  const players = currentWindow === 'today' ? allPlayers : (windowData.yesterday || []);
  // Count grades across all players (ignoring other filters for distribution view)
  const counts = {};
  const gradeValues = ['Milestone', 'Standout', 'Good', 'Routine', 'Off Day', 'Scheduled'];
  gradeValues.forEach(g => counts[g] = 0);
  for (const p of players) {
    const gk = gradeKey(p.performance_grade || '');
    if (counts[gk] !== undefined) counts[gk]++;
  }
  const gradeGroup = document.querySelector('[data-filter="grade"]');
  if (!gradeGroup) return;
  const gradeEmojis = { 'Milestone': '\u{1f48e}', 'Standout': '\u{1f525}', 'Good': '\u2705', 'Routine': '\u{1f610}', 'Off Day': '\u{1f6a9}', 'Scheduled': '\u{1f552}' };
  gradeGroup.querySelectorAll('.filter-btn').forEach(btn => {
    const val = btn.dataset.value;
    if (val === 'all') return;
    const count = counts[val] || 0;
    const emoji = gradeEmojis[val] || '';
    btn.textContent = count > 0 ? `${emoji} ${count}` : emoji;
  });
}

function toggleFiltersForWindow(window) {
  // Show status/grade filters for today and yesterday views
  const statusFilter = document.querySelector('[data-filter="status"]');
  const gradeFilter = document.querySelector('[data-filter="grade"]');

  if (window === 'today' || window === 'yesterday') {
    statusFilter.style.display = 'flex';
    gradeFilter.style.display = 'flex';
  } else {
    statusFilter.style.display = 'none';
    gradeFilter.style.display = 'none';
    // Reset these filters when hidden
    filters.status = 'all';
    filters.grade = 'all';
  }
}

async function switchWindow(window) {
  if (window === currentWindow) return;

  // Save scroll position for current tab
  _scrollPositions[currentWindow] = globalThis.scrollY || 0;

  // Update active tab
  document.querySelectorAll('.time-tab').forEach(t => {
    t.classList.remove('active');
    t.setAttribute('aria-selected', 'false');
  });
  const activeTab = document.querySelector(`[data-window="${window}"]`);
  activeTab.classList.add('active');
  activeTab.setAttribute('aria-selected', 'true');
  currentWindow = window;

  // Toggle filter visibility
  toggleFiltersForWindow(window);
  updateTimestamp();

  // Load data if not cached
  if (window !== 'today' && windowData[window] === null) {
    _windowFetchFailed[window] = false;
    try {
      const resp = await fetch(WINDOW_PATHS[window] + '?t=' + Date.now(), { cache: 'no-store' });
      if (resp.ok) {
        const raw = await resp.json();
        // yesterday_pulse.json uses the same envelope as current_pulse
        if (window === 'yesterday') {
          windowData[window] = raw.players || [];
          yesterdaySourceDate = raw.source_date || null;
        } else {
          windowData[window] = raw;
        }
      } else {
        windowData[window] = [];
        _windowFetchFailed[window] = true;
      }
    } catch (e) {
      console.error('Failed to load window data:', e);
      windowData[window] = [];
      _windowFetchFailed[window] = true;
    }
  }

  updateTimestamp();
  render();

  // Restore scroll position for the new tab
  requestAnimationFrame(() => globalThis.scrollTo(0, _scrollPositions[window] || 0));
}

// Live workflow cron windows (UTC):
//   00:00–06:45 UTC  (every 15 min)  = 8:00 PM–2:45 AM ET
//   14:00–23:45 UTC  (every 15 min)  = 10:00 AM–7:45 PM ET
// Gap: 06:45–14:00 UTC = 2:45 AM–10:00 AM ET (no live runs)
function getNextUpdateTime() {
  const now = new Date();
  const h = now.getUTCHours(), m = now.getUTCMinutes();
  const totalMins = h * 60 + m;
  const GAP_START = 6 * 60 + 46;  // 06:46 UTC (after last run at 06:45)
  const GAP_END   = 14 * 60;       // 14:00 UTC

  let next;
  if (totalMins >= GAP_START && totalMins < GAP_END) {
    // In the gap — next run is 14:00 UTC today
    next = new Date(now);
    next.setUTCHours(14, 0, 0, 0);
  } else {
    // In an active window — next 15-min mark
    const nextM = Math.ceil((m + 1) / 15) * 15;
    next = new Date(now);
    if (nextM >= 60) {
      next.setUTCHours(h + 1, 0, 0, 0);
    } else {
      next.setUTCMinutes(nextM, 0, 0);
    }
    // If rounding pushed us into the gap, jump to 14:00 UTC
    const nh = next.getUTCHours(), nm = next.getUTCMinutes();
    const nextTotal = nh * 60 + nm;
    if (nextTotal >= GAP_START && nextTotal < GAP_END) {
      next.setUTCHours(14, 0, 0, 0);
    }
  }
  return next;
}

function updateNextUpdate() {
  const el = document.getElementById('nextUpdate');
  if (!el) return;
  const next = getNextUpdateTime();
  const timeStr = next.toLocaleTimeString('en-US', {
    hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York', timeZoneName: 'short'
  });
  el.textContent = 'Next update: ' + timeStr;
}

function _getExpectedYesterday() {
  // Mirror the backend 4 AM ET day-flip: before 4 AM ET, "today" is still the prior calendar day
  const now = new Date();
  const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  if (et.getHours() < 4) et.setDate(et.getDate() - 1);
  const yesterday = new Date(et);
  yesterday.setDate(yesterday.getDate() - 1);
  return yesterday.toISOString().slice(0, 10);
}

function updateStaleBanner() {
  const banner = document.getElementById('staleBanner');
  if (!banner) return;
  if (currentWindow !== 'yesterday' || !yesterdaySourceDate) {
    banner.style.display = 'none';
    return;
  }
  const expected = _getExpectedYesterday();
  if (yesterdaySourceDate !== expected) {
    banner.textContent = 'Yesterday data may be outdated — results are from ' +
      new Date(yesterdaySourceDate + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) +
      ', not the most recent game day.';
    banner.style.display = 'block';
  } else {
    banner.style.display = 'none';
  }
}

function updateTimestamp() {
  const el = document.getElementById('updated');
  updateStaleBanner();
  // Yesterday tab: show source date instead of stale relative time
  if (currentWindow === 'yesterday') {
    if (yesterdaySourceDate) {
      const d = new Date(yesterdaySourceDate + 'T12:00:00');
      el.textContent = 'Results from ' + d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    } else {
      el.textContent = '';
    }
    return;
  }
  // Window tabs (7d/season): show last_updated from window data
  if (currentWindow !== 'today') {
    const data = windowData[currentWindow];
    if (Array.isArray(data) && data.length > 0 && data[0].last_updated) {
      const d = new Date(data[0].last_updated);
      const timeStr = d.toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', timeZone: 'America/New_York'
      }) + ', ' + d.toLocaleTimeString('en-US', {
        hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York', timeZoneName: 'short'
      });
      el.textContent = 'Updated ' + timeStr;
    } else {
      el.textContent = '';
    }
    return;
  }
  // Today tab: show absolute last update time
  if (!dataGeneratedAt) {
    el.textContent = '';
    return;
  }
  const gen = new Date(dataGeneratedAt);
  const timeStr = gen.toLocaleTimeString('en-US', {
    hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York', timeZoneName: 'short'
  });
  const now = new Date();
  const diffMin = Math.floor((now - gen) / 60000);
  const ago = diffMin < 1 ? 'just now'
    : diffMin < 60 ? `${diffMin}m ago`
    : diffMin < 1440 ? `${Math.floor(diffMin / 60)}h ago`
    : '';
  el.textContent = `Last update: ${timeStr}${ago ? ` (${ago})` : ''}`;
}

function _isGameHours() {
  // Mirror the cron schedule: active 14:00-06:45 UTC (10 AM-2:45 AM ET)
  const now = new Date();
  const total = now.getUTCHours() * 60 + now.getUTCMinutes();
  const GAP_START = 6 * 60 + 46;  // 06:46 UTC
  const GAP_END   = 14 * 60;       // 14:00 UTC
  return total < GAP_START || total >= GAP_END;
}

function manageAutoRefresh() {
  const indicator = document.getElementById('autoRefreshIndicator');
  const shouldRefresh = currentWindow === 'today' && _isGameHours();
  if (shouldRefresh) {
    if (!autoRefreshTimer) {
      autoRefreshTimer = setInterval(async () => {
        const [raw] = await Promise.all([
          _fetchWithRetry('data/current_pulse.json?t=' + Date.now()),
          fetchHeartbeat()
        ]);
        if (raw) {
          if (Array.isArray(raw)) {
            allPlayers = raw;
            dataGeneratedAt = null;
          } else {
            allPlayers = raw.players || [];
            dataGeneratedAt = raw.generated_at || null;
          }
          updateTimestamp();
          render();
          indicator.querySelector('span').textContent = 'Auto-refreshing';
        } else {
          indicator.querySelector('span').textContent = 'Update failed — retrying';
          // Retry sooner on failure instead of waiting full 5 min
          clearInterval(autoRefreshTimer);
          autoRefreshTimer = null;
          setTimeout(() => setupAutoRefresh(), 15000);
        }
      }, 300000);
    }
    indicator.classList.add('active');
  } else {
    if (autoRefreshTimer) {
      clearInterval(autoRefreshTimer);
      autoRefreshTimer = null;
    }
    indicator.classList.remove('active');
  }
}

function toggleNoGame() {
  const header = document.getElementById('noGameHeader');
  const list = document.getElementById('noGameList');
  header.classList.toggle('open');
  list.classList.toggle('open');
  header.setAttribute('aria-expanded', header.classList.contains('open'));
}

function toggleGameLog(id) {
  const toggle = document.getElementById('glt-' + id);
  const entries = document.getElementById('gle-' + id);
  if (toggle) {
    toggle.classList.toggle('open');
    toggle.setAttribute('aria-expanded', toggle.classList.contains('open'));
  }
  if (entries) entries.classList.toggle('open');
}

// Filter buttons
document.querySelectorAll('.filter-group').forEach(group => {
  const key = group.dataset.filter;
  group.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filters[key] = btn.dataset.value;
      updateClearFiltersBtn();
      render();
    });
  });
});

function updateClearFiltersBtn() {
  const btn = document.getElementById('clearFiltersBtn');
  const hasActive = Object.values(filters).some(v => v !== 'all') || searchQuery;
  btn.style.display = hasActive ? 'inline-block' : 'none';
}

document.getElementById('clearFiltersBtn').addEventListener('click', () => {
  for (const key of Object.keys(filters)) filters[key] = 'all';
  document.querySelectorAll('.filter-group').forEach(group => {
    group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    const allBtn = group.querySelector('[data-value="all"]');
    if (allBtn) allBtn.classList.add('active');
  });
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  updateClearFiltersBtn();
  render();
});

// Time window tabs
document.querySelectorAll('.time-tab').forEach(tab => {
  tab.addEventListener('click', () => switchWindow(tab.dataset.window));
});

// Search input (debounced to avoid re-rendering on every keystroke)
let _searchTimer = null;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    searchQuery = e.target.value.toLowerCase().trim();
    updateClearFiltersBtn();
    render();
  }, 350);
});

// Relative timestamp refresh
setInterval(updateTimestamp, 10000);

// Swipe gestures + pull-to-refresh
const TAB_ORDER = ['today', 'yesterday', '7d', 'season'];
let touchStartX = 0, touchStartY = 0, touchTracking = false;

document.addEventListener('touchstart', e => {
  if (e.target.closest('input, button, a, select')) { touchTracking = false; return; }
  touchTracking = true;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (!touchTracking) return;
  touchTracking = false;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);
  if (absDx < 30 && absDy < 30) return;
  // Horizontal swipe → switch tabs
  if (absDx > 50 && absDx > absDy * 1.5) {
    const idx = TAB_ORDER.indexOf(currentWindow);
    if (dx < 0 && idx < TAB_ORDER.length - 1) switchWindow(TAB_ORDER[idx + 1]);
    else if (dx > 0 && idx > 0) switchWindow(TAB_ORDER[idx - 1]);
    return;
  }
  // Pull down at top → refresh
  if (dy > 80 && absDy > absDx * 2 && window.scrollY <= 0) {
    refreshData();
  }
}, { passive: true });

async function _fetchWithRetry(url, retries = 1, delayMs = 3000) {
  for (let i = 0; i <= retries; i++) {
    try {
      const resp = await fetch(url, { cache: 'no-store' });
      if (resp.ok) return await resp.json();
    } catch (e) { /* retry */ }
    if (i < retries) await new Promise(r => setTimeout(r, delayMs));
  }
  return null;
}

async function refreshData() {
  const indicator = document.getElementById('pullRefresh');
  indicator.classList.add('active');
  indicator.textContent = 'Refreshing...';
  indicator.style.color = '';
  const path = WINDOW_PATHS[currentWindow];
  const [raw] = await Promise.all([
    _fetchWithRetry(path + '?t=' + Date.now()),
    fetchHeartbeat()
  ]);
  if (raw) {
    if (currentWindow === 'today') {
      allPlayers = Array.isArray(raw) ? raw : (raw.players || []);
      dataGeneratedAt = Array.isArray(raw) ? null : (raw.generated_at || null);
      updateTimestamp();
    } else if (currentWindow === 'yesterday') {
      windowData.yesterday = raw.players || [];
      yesterdaySourceDate = raw.source_date || null;
      updateTimestamp();
    } else {
      windowData[currentWindow] = raw;
    }
    render();
    setTimeout(() => indicator.classList.remove('active'), 500);
  } else {
    indicator.textContent = 'Refresh failed — check connection';
    indicator.style.color = '#ef4444';
    setTimeout(() => { indicator.classList.remove('active'); indicator.textContent = 'Refreshing...'; indicator.style.color = ''; }, 3000);
  }
}

// Fetch Heartbeat summary (fire-and-forget, graceful degradation)
async function fetchHeartbeat() {
  try {
    const resp = await fetch('https://sv-heartbeat.vercel.app/api/heartbeat/summary');
    if (!resp.ok) return;
    const data = await resp.json();
    const entries = Array.isArray(data) ? data : (data.players || data.summary || []);
    for (const p of entries) {
      const name = (p.name || p.player_name || '').toLowerCase();
      if (name) heartbeatData.set(name, {
        status: (p.status || 'gray').toLowerCase(),
        loveScore: p.loveScore ?? p.love_score ?? null,
        daysSinceContact: p.daysSinceLeadContact ?? p.daysSinceContact ?? p.days_since_contact ?? null
      });
    }
  } catch (e) {
    // Heartbeat unavailable — hearts won't render, that's fine
  }
}

// Load data — supports both envelope {generated_at, players} and legacy array
(async () => {
  // Fetch pulse data and heartbeat in parallel
  const [raw] = await Promise.all([
    _fetchWithRetry('data/current_pulse.json?t=' + Date.now(), 2, 3000),
    fetchHeartbeat()
  ]);
  if (raw) {
    if (Array.isArray(raw)) {
      allPlayers = raw;
      dataGeneratedAt = null;
    } else {
      allPlayers = raw.players || [];
      dataGeneratedAt = raw.generated_at || null;
    }
    updateTimestamp();
    render();
  } else {
    document.getElementById('grid').innerHTML = '';
    document.getElementById('empty').textContent = 'Failed to load pulse data — check your connection and refresh.';
    document.getElementById('empty').style.display = 'block';
  }
})();

// Show next update time and keep it current
updateNextUpdate();
setInterval(updateNextUpdate, 60000);
</script>
