name: Monday Hitter Recap Email

# Triggered by cron-job.org at 7:30 AM America/New_York every Monday
# (handles DST automatically; GitHub's native schedule is UTC-only and
# silently skipped on first fire — see 2026-06-01 incident).
# The daily historical aggregation at 11:00 UTC rebuilds window_7d.json
# to include Sunday's games before cron-job.org fires this at 11:30 UTC
# (EDT) / 12:30 UTC (EST).
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip sending; render HTML to job log)"
        type: boolean
        default: false
      to:
        description: "Override recipient(s), comma-separated. Empty = default list."
        type: string
        default: ""
      subject_suffix:
        description: "Appended to subject (useful to break Gmail threading on test sends)."
        type: string
        default: ""

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (latest main so windows are fresh)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDF-rendering deps
        # WeasyPrint needs pango + cairo from apt; emoji rendering needs Noto.
        # Liberation fonts cover the table body.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 \
            fonts-liberation fonts-noto-color-emoji
          # 62.3 throws "'super' object has no attribute 'transform'" against
          # current tinycss2/cssselect2; latest stable works.
          pip install --quiet weasyprint

      - name: Send Monday email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
          TO_OVERRIDE: ${{ inputs.to }}
          SUBJECT_SUFFIX: ${{ inputs.subject_suffix }}
        run: |
          set -eo pipefail
          ARGS=()
          if [ "${DRY_RUN:-false}" = "true" ]; then
            ARGS+=("--dry-run")
          fi
          if [ -n "${TO_OVERRIDE:-}" ]; then
            IFS=',' read -ra TOS <<< "${TO_OVERRIDE}"
            for t in "${TOS[@]}"; do
              ARGS+=("--to" "$(echo "$t" | xargs)")
            done
          fi
          if [ -n "${SUBJECT_SUFFIX:-}" ]; then
            ARGS+=("--subject-suffix" "${SUBJECT_SUFFIX}")
          fi
          python -m scripts.monday_email "${ARGS[@]}"
