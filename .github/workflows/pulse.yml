name: SV Dugout Pulse

concurrency:
  group: pulse-data
  cancel-in-progress: false  # let running job finish; queue the next one

on:
  schedule:
    # Historical aggregation - 6am ET daily (11:00 UTC)
    - cron: "0 11 * * *"
    # Yesterday cleanup — just after 4 AM ET day boundary
    - cron: "15 9 * * *"       # 4:15 AM ET — rotate yesterday after day flip
    # Overnight backfill — recover yesterday entries that got Cloudflare-blocked
    # during peak game hours. Two attempts in the dead zone between the last
    # live run (2:45 AM ET) and the morning historical pass (6 AM ET).
    - cron: "0 7 * * *"        # 3:00 AM ET — first backfill attempt
    - cron: "0 9 * * *"        # 5:00 AM ET — second backfill attempt
    # Live updates every 15 minutes during game hours
    - cron: "*/15 14-23 * * *"  # 2pm-11:45pm UTC (10am-7:45pm ET)
    - cron: "*/15 0-6 * * *"   # 12am-6:45am UTC (8pm-2:45am ET)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'live'
        type: choice
        options:
          - live
          - historical
          - backfill
          - both

jobs:
  pulse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          # Check if this is a manual run with specific mode
          if [ "${{ github.event.inputs.mode }}" != "" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          # Use the cron expression that triggered the run (reliable, unlike clock time)
          elif [ "${{ github.event.schedule }}" = "0 11 * * *" ]; then
            echo "mode=historical" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 7 * * *" ] || [ "${{ github.event.schedule }}" = "0 9 * * *" ]; then
            echo "mode=backfill" >> $GITHUB_OUTPUT
          else
            echo "mode=live" >> $GITHUB_OUTPUT
          fi

      - name: Run live pulse
        if: steps.mode.outputs.mode == 'live' || steps.mode.outputs.mode == 'both'
        env:
          ROSTER_URL: ${{ secrets.ROSTER_URL }}
          RECRUITS_URL: ${{ secrets.RECRUITS_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          HS_STATS_URL: ${{ secrets.HS_STATS_URL }}
          # TEMP: proxy was returning 403 from SB's WAF — testing direct
          # curl_cffi Chrome impersonation from the Actions runner.  Restore
          # `${{ secrets.SB_PROXY_URL }}` if direct also fails.
          SB_PROXY_URL: ""
          # Residential HTTP proxy pool — primary (Webshare) + backup (IPRoyal)
          # + last-resort Cloudflare-bypass service (ScraperAPI proxy mode).
          # Pool rotates on 403: when one tier's IP gets flagged by CF, the
          # next tier takes over for the rest of the run. Tier 3 is billed
          # per request — only hit when both residential tiers are dead.
          SB_HTTP_PROXY: ${{ secrets.SB_HTTP_PROXY }}
          SB_HTTP_PROXY_2: ${{ secrets.SB_HTTP_PROXY_2 }}
          SB_HTTP_PROXY_3: ${{ secrets.SB_HTTP_PROXY_3 }}
        run: |
          set -eo pipefail
          if [ -z "$SLACK_WEBHOOK_URL" ]; then echo "⚠️ SLACK_WEBHOOK_URL not set — alerts will be skipped"; fi
          if [ -z "$ROSTER_URL" ]; then echo "ERROR: ROSTER_URL not set"; exit 1; fi
          python -c "import src.config; import src.roster_manager; import src.stats_engine; import src.performance_analyzer; import src.alerts; print('All imports OK')"
          python main.py 2>&1 | tee /dev/stderr

      - name: Run overnight backfill
        if: steps.mode.outputs.mode == 'backfill'
        env:
          ROSTER_URL: ${{ secrets.ROSTER_URL }}
          RECRUITS_URL: ${{ secrets.RECRUITS_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          HS_STATS_URL: ${{ secrets.HS_STATS_URL }}
          SB_PROXY_URL: ""
          SB_HTTP_PROXY: ${{ secrets.SB_HTTP_PROXY }}
          SB_HTTP_PROXY_2: ${{ secrets.SB_HTTP_PROXY_2 }}
          SB_HTTP_PROXY_3: ${{ secrets.SB_HTTP_PROXY_3 }}
        run: |
          set -eo pipefail
          if [ -z "$ROSTER_URL" ]; then echo "ERROR: ROSTER_URL not set"; exit 1; fi
          python main.py --backfill 2>&1 | tee /dev/stderr

      - name: Run historical aggregation
        if: steps.mode.outputs.mode == 'historical' || steps.mode.outputs.mode == 'both'
        env:
          ROSTER_URL: ${{ secrets.ROSTER_URL }}
          RECRUITS_URL: ${{ secrets.RECRUITS_URL }}
          HS_STATS_URL: ${{ secrets.HS_STATS_URL }}
          SB_PROXY_URL: ${{ secrets.SB_PROXY_URL }}
          SB_HTTP_PROXY: ${{ secrets.SB_HTTP_PROXY }}
          SB_HTTP_PROXY_2: ${{ secrets.SB_HTTP_PROXY_2 }}
          SB_HTTP_PROXY_3: ${{ secrets.SB_HTTP_PROXY_3 }}
        run: |
          set -eo pipefail
          python -c "import src.historical_stats; import src.window_grader; print('Historical imports OK')"
          python main.py --historical 2>&1 | tee /dev/stderr

      - name: Commit updated pulse data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --staged --quiet || git commit -m "Update pulse data [bot]"
          # Merge remote changes, preferring our freshly-generated data files on conflict.
          # Aborting and skipping the push causes sent_alerts.json to stay stale,
          # which makes the next run re-fire the same Slack alerts (double-alert bug).
          git fetch origin main
          git merge -X ours origin/main --no-edit -m "Merge concurrent pulse data [bot]" || true
          git push
