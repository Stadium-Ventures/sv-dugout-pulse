name: Summer Ball Roster Refresh

# Runs four times a day. Per-league discovery is cheap; the real reason
# for multiple passes is The Baseball Cube. Cube's "next-day stats"
# claim is best-effort — yesterday's box scores often don't appear
# until mid-morning or later, and individual profiles fill in across
# the day. Each pass re-checks every still-unmatched NCAA client, so
# whichever pass catches Cube's update window wins.
#
# 08:00 UTC = 4 AM ET   — earliest Cube update window
# 13:00 UTC = 9 AM ET   — after Cube's typical batch finishes
# 17:00 UTC = 1 PM ET   — afternoon catch-up
# 22:00 UTC = 6 PM ET   — last pass before evening games begin
on:
  schedule:
    - cron: "0 8 * * *"
    - cron: "0 13 * * *"
    - cron: "0 17 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run discovery without writing the roster file."
        type: boolean
        default: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet -r requirements.txt

      - name: Refresh summer rosters
        env:
          ROSTER_URL: ${{ secrets.ROSTER_URL }}
          RECRUITS_URL: ${{ secrets.RECRUITS_URL }}
          HS_STATS_URL: ${{ secrets.HS_STATS_URL }}
          # Pointstreak (Northwoods backend) is Incapsula-gated; reuse the
          # SB residential proxy pool to punch through.
          SB_HTTP_PROXY: ${{ secrets.SB_HTTP_PROXY }}
          SB_HTTP_PROXY_2: ${{ secrets.SB_HTTP_PROXY_2 }}
          SB_HTTP_PROXY_3: ${{ secrets.SB_HTTP_PROXY_3 }}
        run: |
          set -eo pipefail
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m scripts.refresh_summer_rosters --dry
          else
            python -m scripts.refresh_summer_rosters
          fi

      - name: Roster-regression alert (#sv-automation)
        if: ${{ inputs.dry_run != true }}
        env:
          SV_AUTOMATION_WEBHOOK_URL: ${{ secrets.SV_AUTOMATION_WEBHOOK_URL }}
        run: python -m scripts.summer_roster_regression_alert

      - name: Quiet-streak alert (#sv-automation)
        if: ${{ inputs.dry_run != true }}
        env:
          SV_AUTOMATION_WEBHOOK_URL: ${{ secrets.SV_AUTOMATION_WEBHOOK_URL }}
        run: python -m scripts.summer_quiet_streak_alert

      - name: Commit roster snapshot
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/summer_ball_rosters.json data/_last_league_counts.json data/_last_summer_games.json
          if git diff --staged --quiet; then
            echo "No roster changes to commit"
            exit 0
          fi
          git commit -m "Refresh summer ball rosters [bot]"
          # Discard any unrelated working-tree changes (e.g. roster_cache.json
          # touched by the discovery run) so merge doesn't abort. Past failure:
          # 2026-05-31 14:46 UTC "local changes to roster_cache.json would be
          # overwritten by merge".
          git checkout -- .
          # Retry push up to 3x — pulse bot commits every 15min so race
          # conflicts are common.
          for attempt in 1 2 3; do
            git fetch origin main
            git merge -X ours origin/main --no-edit -m "Merge concurrent pulse data [bot]" || true
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying..."
            sleep 5
          done
          echo "All push attempts failed"
          exit 1
